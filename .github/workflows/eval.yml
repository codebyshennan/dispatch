name: Prompt Regression Eval

on:
  pull_request:
    # Triggers on:
    # - Any prompt file change (classification or response generation prompts)
    # - Golden dataset changes (200+ labeled tickets)
    # - Response generator Lambda changes (prompt loading + compliance gate)
    # - Eval runner changes (runner.ts, schema, CLI)
    # EVAL-02: classification accuracy must stay above threshold on every prompt change
    paths:
      - 'prompts/**'
      - 'datasets/golden/**'
      - 'lambdas/response-generator/**'
      - 'lambdas/eval/**'

jobs:
  eval:
    name: Classification Accuracy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run classification eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval --prompt classification/v1 --dataset classification-v1 --threshold 85

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-output.json
          if-no-files-found: ignore
