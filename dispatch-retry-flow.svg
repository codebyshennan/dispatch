<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/></marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#6366f1"/></marker>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Card Executor — Per-Item Retry</text>
  <text x="480" y="47" text-anchor="middle" font-size="11" fill="#64748b">Idempotent execution with exponential backoff · max 3 retries</text>
  <rect x="270" y="64" width="140" height="34" rx="17" fill="#0f172a"/>
  <text x="340" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">item scheduled</text>
  <line x1="340" y1="98" x2="340" y2="119" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="340,119 440,146 340,173 240,146" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="340" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">status</text>
  <text x="340" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">terminal?</text>
  <line x1="440" y1="146" x2="577" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="586" y="125" width="16" height="16" rx="3" fill="#f1f5f9"/>
  <text x="592" y="137" font-size="9" fill="#64748b">yes</text>
  <rect x="580" y="128" width="200" height="32" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="680" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">return (no-op)</text>
  <text x="680" y="159" text-anchor="middle" font-size="10" fill="#64748b">idempotent guard</text>
  <text x="326" y="187" font-size="9" fill="#64748b">no</text>
  <line x1="340" y1="173" x2="340" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="240" y="200" width="200" height="42" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Execute card operation</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#6d28d9">simulate API call · determine outcome</text>
  <line x1="340" y1="242" x2="340" y2="262" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="340,264 440,291 340,318 240,291" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="340" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">success?</text>
  <line x1="440" y1="291" x2="577" y2="291" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="586" y="270" width="16" height="16" rx="3" fill="#d1fae5"/>
  <text x="592" y="282" font-size="9" fill="#047857">yes</text>
  <rect x="580" y="273" width="200" height="38" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="680" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">mark succeeded</text>
  <text x="680" y="302" text-anchor="middle" font-size="10" fill="#047857">update job tallies</text>
  <text x="326" y="332" font-size="9" fill="#64748b">no</text>
  <line x1="340" y1="318" x2="340" y2="343" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="340,345 440,372 340,399 240,372" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="340" y="368" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">compliance /</text>
  <text x="340" y="382" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">locked error?</text>
  <line x1="440" y1="372" x2="577" y2="372" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="586" y="351" width="16" height="16" rx="3" fill="#fee2e2"/>
  <text x="592" y="363" font-size="9" fill="#b91c1c">yes</text>
  <rect x="580" y="354" width="200" height="38" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="680" y="371" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">permanently_failed</text>
  <text x="680" y="383" text-anchor="middle" font-size="10" fill="#b91c1c">no further scheduling</text>
  <text x="326" y="413" font-size="9" fill="#64748b">no</text>
  <line x1="340" y1="399" x2="340" y2="424" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="340,426 440,453 340,480 240,453" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="340" y="449" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">retry_count</text>
  <text x="340" y="463" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">&gt;= 3?</text>
  <line x1="440" y1="453" x2="577" y2="453" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="586" y="432" width="16" height="16" rx="3" fill="#fee2e2"/>
  <text x="592" y="444" font-size="9" fill="#b91c1c">yes</text>
  <rect x="580" y="435" width="200" height="38" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="680" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">permanently_failed</text>
  <text x="680" y="464" text-anchor="middle" font-size="10" fill="#b91c1c">retries exhausted</text>
  <text x="326" y="494" font-size="9" fill="#64748b">no</text>
  <line x1="340" y1="480" x2="340" y2="505" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <rect x="230" y="507" width="220" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="525" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">schedule retry + backoff</text>
  <text x="340" y="539" text-anchor="middle" font-size="10" fill="#b45309">2^n × 1000ms → 2s / 4s / 8s</text>
  <text x="340" y="553" text-anchor="middle" font-size="10" fill="#b45309">increment retry_count</text>
  <path d="M230,533 C100,533 100,221 240,221" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-a)"/>
  <rect x="52" y="347" width="76" height="14" rx="3" fill="#fffbeb"/>
  <text x="90" y="358" text-anchor="middle" font-size="9" fill="#92400e">re-execute</text>
</svg>