  <text x="845" y="387" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">schema (convex/schema.ts)</text>
  <text x="760" y="403" font-size="9" fill="#047857" font-family="ui-monospace,monospace">.vectorIndex(</text>
