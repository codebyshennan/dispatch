  <text x="872" y="268" text-anchor="middle" font-size="10" fill="#475569" font-family="ui-monospace,monospace">.vectorIndex(</text>
  <text x="872" y="281" text-anchor="middle" font-size="10" fill="#475569" font-family="ui-monospace,monospace">  by_embedding)</text>
