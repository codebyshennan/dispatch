<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/></marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#6366f1"/></marker>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Job State Machine</text>
  <text x="480" y="47" text-anchor="middle" font-size="11" fill="#64748b">Job lifecycle from intent capture to terminal state</text>
  <circle cx="480" cy="74" r="10" fill="#0f172a"/>
  <line x1="480" y1="84" x2="480" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="380" y="102" width="200" height="50" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="480" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a" font-family="ui-monospace,monospace">draft</text>
  <text x="480" y="140" text-anchor="middle" font-size="10" fill="#64748b">intent captured · no cards touched</text>
  <line x1="480" y1="152" x2="480" y2="197" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="384" y="163" width="192" height="16" rx="3" fill="#f1f5f9"/>
  <text x="480" y="175" text-anchor="middle" font-size="9" fill="#64748b">operator confirms</text>
  <rect x="380" y="199" width="200" height="50" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6" font-family="ui-monospace,monospace">in-progress</text>
  <text x="480" y="237" text-anchor="middle" font-size="10" fill="#6d28d9">items executing · staggered fan-out</text>
  <path d="M430,249 L430,280 L150,280 L150,357" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-g)"/>
  <rect x="60" y="282" width="178" height="14" rx="3" fill="#f0fdf4"/>
  <text x="149" y="293" text-anchor="middle" font-size="9" fill="#047857">all items succeeded</text>
  <path d="M490,249 L490,357" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr-a)"/>
  <rect x="396" y="282" width="186" height="14" rx="3" fill="#fffbeb"/>
  <text x="489" y="293" text-anchor="middle" font-size="9" fill="#92400e">some items failed</text>
  <path d="M530,249 L530,280 L800,280 L800,357" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="634" y="282" width="166" height="14" rx="3" fill="#f8fafc"/>
  <text x="717" y="293" text-anchor="middle" font-size="9" fill="#64748b">operator cancels</text>
  <rect x="60" y="359" width="180" height="50" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="150" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46" font-family="ui-monospace,monospace">completed</text>
  <text x="150" y="397" text-anchor="middle" font-size="10" fill="#047857">all items terminal</text>
  <rect x="375" y="359" width="230" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace,monospace">completed</text>
  <text x="490" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace,monospace">_with_failures</text>
  <rect x="700" y="359" width="180" height="50" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="790" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" font-family="ui-monospace,monospace">cancelled</text>
  <text x="790" y="397" text-anchor="middle" font-size="10" fill="#64748b">items exit early</text>
  <path d="M375,384 C280,384 280,224 378,224" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-a)"/>
  <rect x="228" y="292" width="130" height="14" rx="3" fill="#fffbeb"/>
  <text x="293" y="303" text-anchor="middle" font-size="9" fill="#92400e">retry failed items</text>
  <line x1="150" y1="409" x2="150" y2="425" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="150" cy="440" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="150" cy="440" r="6" fill="#0f172a"/>
  <line x1="490" y1="409" x2="490" y2="425" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="490" cy="440" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="490" cy="440" r="6" fill="#0f172a"/>
  <line x1="790" y1="409" x2="790" y2="425" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="790" cy="440" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="790" cy="440" r="6" fill="#0f172a"/>
</svg>