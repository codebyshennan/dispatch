<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/></marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
  </defs>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Job State Machine</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#64748b">Job lifecycle from intent capture to terminal state</text>
  <circle cx="480" cy="74" r="10" fill="#0f172a"/>
  <line x1="480" y1="84" x2="480" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="360" y="104" width="240" height="58" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="480" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a" font-family="ui-monospace,monospace">draft</text>
  <text x="480" y="148" text-anchor="middle" font-size="11" fill="#64748b">intent captured · no cards touched</text>
  <line x1="480" y1="162" x2="480" y2="206" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="380" y="173" width="200" height="18" rx="3" fill="#f1f5f9"/>
  <text x="480" y="186" text-anchor="middle" font-size="10" fill="#64748b">operator confirms</text>
  <rect x="360" y="208" width="240" height="58" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6" font-family="ui-monospace,monospace">in-progress</text>
  <text x="480" y="252" text-anchor="middle" font-size="11" fill="#6d28d9">items executing · staggered fan-out</text>
  <path d="M420,266 L420,296 L150,296 L150,374" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-g)"/>
  <rect x="56" y="298" width="186" height="16" rx="3" fill="#f0fdf4"/>
  <text x="149" y="310" text-anchor="middle" font-size="10" fill="#047857">all items succeeded</text>
  <path d="M492,266 L492,374" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr-a)"/>
  <rect x="396" y="298" width="190" height="16" rx="3" fill="#fffbeb"/>
  <text x="491" y="310" text-anchor="middle" font-size="10" fill="#92400e">some items failed</text>
  <path d="M540,266 L540,296 L810,296 L810,374" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="640" y="298" width="170" height="16" rx="3" fill="#f8fafc"/>
  <text x="725" y="310" text-anchor="middle" font-size="10" fill="#64748b">operator cancels</text>
  <rect x="50" y="376" width="200" height="58" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="150" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="ui-monospace,monospace">completed</text>
  <text x="150" y="420" text-anchor="middle" font-size="11" fill="#047857">all items terminal</text>
  <rect x="372" y="376" width="240" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="492" y="399" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace,monospace">completed</text>
  <text x="492" y="417" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace,monospace">_with_failures</text>
  <rect x="710" y="376" width="200" height="58" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="810" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" font-family="ui-monospace,monospace">cancelled</text>
  <text x="810" y="420" text-anchor="middle" font-size="11" fill="#64748b">items exit early</text>
  <path d="M372,405 C270,405 270,237 358,237" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-a)"/>
  <rect x="212" y="308" width="136" height="16" rx="3" fill="#fffbeb"/>
  <text x="280" y="320" text-anchor="middle" font-size="10" fill="#92400e">retry failed items</text>
  <line x1="150" y1="434" x2="150" y2="450" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="150" cy="466" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="150" cy="466" r="6" fill="#0f172a"/>
  <line x1="492" y1="434" x2="492" y2="450" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="492" cy="466" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="492" cy="466" r="6" fill="#0f172a"/>
  <line x1="810" y1="434" x2="810" y2="450" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="810" cy="466" r="10" fill="none" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="810" cy="466" r="6" fill="#0f172a"/>
</svg>