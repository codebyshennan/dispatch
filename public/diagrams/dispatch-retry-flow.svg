<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 740" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/></marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
  </defs>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Card Executor — Per-Item Retry</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#64748b">Idempotent execution with exponential backoff · max 3 retries</text>
  <rect x="280" y="66" width="160" height="36" rx="18" fill="#0f172a"/>
  <text x="360" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">item scheduled</text>
  <line x1="360" y1="102" x2="360" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="360,122 480,152 360,182 240,152" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">status</text>
  <text x="360" y="164" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">terminal?</text>
  <line x1="480" y1="152" x2="527" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="530" y="127" width="220" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="640" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">return (no-op)</text>
  <text x="640" y="164" text-anchor="middle" font-size="11" fill="#64748b">idempotent guard</text>
  <text x="490" y="142" font-size="10" fill="#64748b">yes</text>
  <text x="348" y="196" font-size="10" fill="#64748b">no</text>
  <line x1="360" y1="182" x2="360" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="240" y="207" width="240" height="52" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Execute card operation</text>
  <text x="360" y="246" text-anchor="middle" font-size="11" fill="#6d28d9">simulate API call · determine outcome</text>
  <line x1="360" y1="259" x2="360" y2="281" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="360,283 480,313 360,343 240,313" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="317" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">success?</text>
  <line x1="480" y1="313" x2="527" y2="313" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="530" y="288" width="220" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">mark succeeded</text>
  <text x="640" y="325" text-anchor="middle" font-size="11" fill="#047857">update job tallies</text>
  <text x="490" y="303" font-size="10" fill="#64748b">yes</text>
  <text x="348" y="357" font-size="10" fill="#64748b">no</text>
  <line x1="360" y1="343" x2="360" y2="366" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="360,390 480,420 360,450 240,420" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">compliance /</text>
  <text x="360" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">locked error?</text>
  <line x1="480" y1="420" x2="527" y2="420" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="530" y="395" width="220" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">permanently_failed</text>
  <text x="640" y="432" text-anchor="middle" font-size="11" fill="#b91c1c">no further scheduling</text>
  <text x="490" y="410" font-size="10" fill="#64748b">yes</text>
  <text x="348" y="464" font-size="10" fill="#64748b">no</text>
  <line x1="360" y1="450" x2="360" y2="473" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="360,497 480,527 360,557 240,527" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="360" y="522" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">retry_count</text>
  <text x="360" y="539" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">&gt;= 3?</text>
  <line x1="480" y1="527" x2="527" y2="527" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="530" y="502" width="220" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="523" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">permanently_failed</text>
  <text x="640" y="539" text-anchor="middle" font-size="11" fill="#b91c1c">retries exhausted</text>
  <text x="490" y="517" font-size="10" fill="#64748b">yes</text>
  <text x="348" y="571" font-size="10" fill="#64748b">no</text>
  <line x1="360" y1="557" x2="360" y2="580" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <rect x="240" y="582" width="240" height="62" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="603" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">schedule retry + backoff</text>
  <text x="360" y="620" text-anchor="middle" font-size="11" fill="#b45309">2^n × 1000ms → 2s / 4s / 8s</text>
  <text x="360" y="636" text-anchor="middle" font-size="11" fill="#b45309">increment retry_count</text>
  <path d="M240,614 C90,614 90,233 240,233" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-a)"/>
  <rect x="42" y="387" width="80" height="16" rx="3" fill="#fffbeb"/>
  <text x="82" y="399" text-anchor="middle" font-size="10" fill="#92400e">re-execute</text>
</svg>